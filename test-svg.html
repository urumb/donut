<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donut Test</title>
<style>
  body {
    background: #fbf6ec;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .donut-container {
    width: 300px;
    height: 300px;
  }
  .donut-container svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .cursor-bite-click {
    display: block; /* Test bite mark visibility */
  }
</style>
</head>
<body>
  <div class="donut-container">
    <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#2B1B12" flood-opacity="0.35" />
        <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#2B1B12" flood-opacity="0.15" />
      </filter>
      <radialGradient id="dough" cx="40%" cy="30%" r="60%">
        <stop offset="0%" stop-color="#FCE1BC"/>
        <stop offset="40%" stop-color="#E8A962"/>
        <stop offset="80%" stop-color="#B85E23"/>
        <stop offset="100%" stop-color="#7A3911"/>
      </radialGradient>
      <radialGradient id="dough-hole" cx="50%" cy="50%" r="50%">
        <stop offset="60%" stop-color="#4A2000" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#4A2000" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="icing-base" x1="20%" y1="10%" x2="80%" y2="90%">
        <stop offset="0%" stop-color="#FFB3D1"/>
        <stop offset="35%" stop-color="#F25B96"/>
        <stop offset="75%" stop-color="#C22061"/>
        <stop offset="100%" stop-color="#8A1343"/>
      </linearGradient>
      <radialGradient id="icing-highlight" cx="35%" cy="25%" r="45%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
        <stop offset="25%" stop-color="#FFD1E3" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#FFD1E3" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="icing-edge" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
      <filter id="icing-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2.5" stdDeviation="1.5" flood-color="#7A3911" flood-opacity="0.5" />
      </filter>
      <filter id="sprinkle-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#8A1343" flood-opacity="0.6" />
      </filter>
      <radialGradient id="bite-gradient" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FCE1BC"/>
        <stop offset="60%" stop-color="#E8A962"/>
        <stop offset="100%" stop-color="#B85E23"/>
      </radialGradient>
      <linearGradient id="bite-shadow" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#5C2B17" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#5C2B17" stop-opacity="0"/>
      </linearGradient>
      <mask id="donut-mask" x="-30%" y="-30%" width="160%" height="160%">
        <rect x="-30" y="-30" width="132" height="132" fill="white" />
        <g class="cursor-bite-click">
          <circle cx="58" cy="18" r="10.5" fill="black" />
          <circle cx="65" cy="27" r="8.5" fill="black" />
          <circle cx="57" cy="32" r="7" fill="black" />
        </g>
      </mask>
    </defs>
    <g filter="url(#shadow)">
      <g mask="url(#donut-mask)">
        <path fill-rule="evenodd" d="M36 8a28 28 0 1 1 0 56 28 28 0 0 1 0-56zm0 17a11 11 0 1 0 0 22 11 11 0 0 0 0-22z" fill="url(#dough)" />
        <path fill-rule="evenodd" d="M36 19a17 17 0 1 1 0 34 17 17 0 0 1 0-34zm0 6a11 11 0 1 0 0 22 11 11 0 0 0 0-22z" fill="url(#dough-hole)" />
        <path id="icing-shape" fill-rule="evenodd" d="
          M 36 9.5
          C 46 9.5, 54 11.5, 59 18
          C 61 21, 63.5 25, 63.5 31
          C 63.5 35, 62.5 39, 60.5 43
          C 59 46, 61 51, 57 56
          C 54 59.5, 48 62.5, 42 62.5
          C 36 62.5, 31 60, 26 61.5
          C 21 63, 14 59, 11.5 53
          C 9 47, 9.5 41, 9.5 36
          C 9.5 29, 8 23, 12.5 17
          C 17 11, 26 9.5, 36 9.5 Z
          M 36 23
          C 31 23, 27 25, 25 29
          C 23 33, 24 38, 27 43
          C 30 47, 36 49, 41 47
          C 45 45, 49 41, 48 35
          C 47 30, 42 23, 36 23 Z
        " fill="url(#icing-base)" filter="url(#icing-shadow)" />
        <use href="#icing-shape" fill="url(#icing-highlight)" />
        <use href="#icing-shape" fill="none" stroke="url(#icing-edge)" stroke-width="1.2" opacity="0.9" />
        <path d="M 28 14 C 34 11, 40 12, 45 15 C 42 13, 36 12, 30 15 Z" fill="#FFFFFF" opacity="0.6" />
        <path d="M 12 36 C 12 30, 14 25, 17 20 C 15 25, 14 30, 14 36 Z" fill="#FFFFFF" opacity="0.5" />
        <g filter="url(#sprinkle-shadow)">
          <rect x="22" y="16" width="6" height="2.5" rx="1.25" fill="#42D1F5" transform="rotate(-20 25 17.5)" />
          <rect x="42" y="14" width="7" height="2.5" rx="1.25" fill="#FFE838" transform="rotate(35 45.5 15.25)" />
          <rect x="15" y="32" width="6" height="2.5" rx="1.25" fill="#FFFFFF" transform="rotate(15 18 33.25)" />
          <rect x="52" y="28" width="6" height="2.5" rx="1.25" fill="#A852FF" transform="rotate(-45 55 29.25)" />
          <rect x="25" y="48" width="7" height="2.5" rx="1.25" fill="#4EE66A" transform="rotate(-10 28.5 49.25)" />
          <rect x="42" y="52" width="6" height="2.5" rx="1.25" fill="#FFFFFF" transform="rotate(60 45 53.25)" />
          <rect x="55" y="42" width="6" height="2.5" rx="1.25" fill="#FFE838" transform="rotate(25 58 43.25)" />
          <rect x="32" y="58" width="6" height="2.5" rx="1.25" fill="#42D1F5" transform="rotate(-65 35 59.25)" />
          <rect x="12" y="44" width="6" height="2.5" rx="1.25" fill="#A852FF" transform="rotate(55 15 45.25)" />
          <rect x="35" y="12" width="6" height="2.5" rx="1.25" fill="#4EE66A" transform="rotate(-80 38 13.25)" />
        </g>
      </g>
      <g class="cursor-bite-click">
        <circle cx="58" cy="18" r="9.5" fill="url(#bite-gradient)" />
        <circle cx="65" cy="27" r="7.5" fill="url(#bite-gradient)" />
        <circle cx="57" cy="32" r="6" fill="url(#bite-gradient)" />
        <circle cx="58" cy="18" r="9.5" fill="url(#bite-shadow)" />
        <circle cx="65" cy="27" r="7.5" fill="url(#bite-shadow)" />
        <circle cx="57" cy="32" r="6" fill="url(#bite-shadow)" />
        <circle cx="55" cy="19" r="1.5" fill="#FFE8B5" />
        <circle cx="63" cy="26" r="1.2" fill="#7A3911" />
        <circle cx="54" cy="29" r="1.8" fill="#FFE8B5" />
        <circle cx="58" cy="32" r="1" fill="#7A3911" />
        <circle cx="59" cy="15" r="1.2" fill="#B85E23" />
      </g>
    </g>
    </svg>
  </div>
</body>
</html>
